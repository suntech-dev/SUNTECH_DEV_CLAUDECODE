<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Test</title>
  <link rel="stylesheet" href="../../assets/css/test_api.css">
</head>
<body>
  <div class="container">
    <h1>send_downtime_completed</h1>
    <form id="testForm">
      <div class="form-group">
        <label for="mac">mac</label>
        <input type="text" id="mac" name="mac" value="84:72:07:50:37:73">
      </div>
      <div class="form-group">
        <label for="downtime_idx">downtime_idx</label>
        <input type="text" id="downtime_idx" name="downtime_idx" value="1">
      </div>
      <button type="submit" class="btn">Send Request</button>
    </form>

    <div id="elapsed">응답 시간: -</div>

    <h2>Response</h2>
    <pre id="response"></pre>
  </div>

  <script>
    // 폼 제출 이벤트를 감지하여 API 요청을 보내기.
    document.getElementById('testForm').addEventListener('submit', function(e) {
      e.preventDefault(); // 기본 폼 제출 동작 방지.

      const formData = new FormData(this);
      const mac = formData.get('mac');
      const downtime_idx = formData.get('downtime_idx');
      const elapsedEl = document.getElementById("elapsed");

      // MAC 주소와 downtime_idx 유효성 검사.
      if (!mac || !downtime_idx) {
        alert("MAC 주소와 downtime_idx 모두 입력하세요.");
        return;
      }

      const params = new URLSearchParams(formData);
      const start = performance.now(); // 요청 시작 시간 기록.

      // `fetch`를 사용하여 API에 POST 요청을 보내기.
      fetch(`./api/sewing.php?code=send_downtime_completed&${params.toString()}`, {
        method: 'POST'
      })
      .then(response => {
        // 서버 응답이 ok가 아닌 경우 에러를 처리.
        if (!response.ok) {
          return response.text().then(text => {
            throw new Error(`Server responded with ${response.status}: ${text}`);
          });
        }
        return response.json(); // 응답을 JSON 형태로 파싱.
      })
      .then(data => {
        const end = performance.now(); // 요청 완료 시간을 기록.
        elapsedEl.textContent = `응답 시간: ${(end - start).toFixed(2)} ms`; // 경과 시간을 화면에 표시.
        // 받은 데이터를 JSON 문자열로 변환하여 화면에 예쁘게 표시.
        document.getElementById('response').textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        const end = performance.now();
        elapsedEl.textContent = `응답 시간: ${(end - start).toFixed(2)} ms`;
        // 에러 메시지를 화면에 표시
        document.getElementById('response').textContent = `Error: ${error.message}`;
        console.error('Fetch Error:', error);
      });
    });
  </script>
</body>
</html>
