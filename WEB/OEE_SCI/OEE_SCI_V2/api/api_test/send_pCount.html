<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Test - send_pCount</title>
  <link rel="stylesheet" href="../../assets/css/test_api.css">
</head>
<body>
  <div class="container">
    <h1>send_pCount</h1>
    <form id="testForm">
      <div class="form-group">
        <label for="mac">mac (MAC 주소)</label>
        <input type="text" id="mac" name="mac" value="84:72:07:50:37:73">
      </div>
      <div class="form-group">
        <label for="pi">pi (pair_info)</label>
        <input type="text" id="pi" name="pi" value="1">
      </div>
      <div class="form-group">
        <label for="pc">pc (pair_count)</label>
        <input type="text" id="pc" name="pc" value="1">
      </div>
      <div class="form-group">
        <label for="design_no">design no (design_no)</label>
        <input type="text" id="design_no" name="design_no" value="100">
      </div>
      <div class="form-group">
        <label for="sc">sc (actual_output) : 누적</label>
        <input type="text" id="sc" name="sc" value="1">
      </div>
      <!-- <div class="form-group">
        <label for="ct">ct (first_sewing_time in ms)</label>
        <input type="text" id="ct" name="ct" value="30000">
      </div> -->
      <button type="submit" class="btn">Send Request</button>
    </form>

    <div id="elapsed">응답 시간: -</div>

    <h2>Response</h2>
    <pre id="response"></pre>
  </div>

  <script>
    // 폼 제출 이벤트를 감지하여 API 요청을 보내기
    document.getElementById('testForm').addEventListener('submit', function(e) {
      e.preventDefault(); // 기본 폼 제출 동작을 막기

      const formData = new FormData(this);
      const mac = formData.get('mac');
      const elapsedEl = document.getElementById("elapsed");

      // MAC 주소가 입력되었는지 확인
      if (!mac) {
        alert("MAC 주소를 입력하세요.");
        return;
      }

      const params = new URLSearchParams(formData);
      const start = performance.now(); // 요청 시작 시간을 기록

      // `fetch`를 사용하여 API에 POST 요청을 보냅니다.
      // `start.html`에서는 './sewing.php'를 사용했지만, 파일 구조상 `../sewing.php`가 정확한 경로입니다. --> ../ 로 하면 에러나는데???
      fetch(`./sewing.php?code=send_pCount&${params.toString()}`, {
        method: 'POST'
      })
      .then(response => {
        // 서버 응답이 정상(ok)이 아닌 경우 에러를 처리합니다.
        if (!response.ok) {
          return response.text().then(text => { 
            throw new Error(`서버 응답 ${response.status}: ${text}`);
          });
        }
        return response.json(); // 응답을 JSON 형태로 파싱합니다.
      })
      .then(data => {
        const end = performance.now(); // 요청 완료 시간을 기록합니다.
        elapsedEl.textContent = `응답 시간: ${(end - start).toFixed(2)} ms`; // 경과 시간을 화면에 표시합니다.
        // 받은 데이터를 JSON 문자열로 변환하여 화면에 예쁘게 표시합니다.
        document.getElementById('response').textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        const end = performance.now();
        elapsedEl.textContent = `응답 시간: ${(end - start).toFixed(2)} ms`;
        // 에러 메시지를 화면에 표시합니다.
        document.getElementById('response').textContent = `오류: ${error.message}`;
        console.error('Fetch 오류:', error);
      });
    });
  </script>
</body>
</html>
